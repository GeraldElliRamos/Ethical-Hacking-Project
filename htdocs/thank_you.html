<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Gear Summit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .thank-you-card { text-align: center; padding: 40px; background: white; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .check-icon { font-size: 50px; color: #28a745; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 thank-you-card shadow">
      <div class="check-icon">✓</div>
      <h1 class="display-5 fw-bold">Order Placed!</h1>
      <p class="lead">Thank you for your purchase. We've received your order and are getting it ready for shipment.</p>
      <hr>
      <p class="text-muted">You will receive an email confirmation shortly.</p>
      <a href="index.html" class="btn btn-primary rounded-pill px-4">Continue Shopping</a>
    </div>
  </div>
</div>

</body>
</html>
