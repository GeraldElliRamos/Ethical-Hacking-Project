    .bg-light-custom {
      background-color: #f8f9fa;

      padding-bottom: 0.5rem;

    .navbar-nav .nav-link {
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
    }

    .login-wrap {
      min-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
    }
  </style>
</head>

<body class="bg-light-custom">

  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-3 py-2">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="./assets/Logo.png" alt="Gear Summit Logo" height="35" />
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="Apparel.html">Shop</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contact.html">Contact Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="login.html">Login</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="login-wrap py-5">
    <section class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
              <h3 class="card-title text-center mb-4 fw-semibold">Welcome Back</h3>
              <p class="text-center text-muted mb-4">Sign in to continue shopping.</p>

              <form action="login.php" method="POST">
                <div class="mb-3">
                  <label for="login-identifier" class="form-label">Username or Email</label>
                  <input type="text" class="form-control" id="login-identifier" name="identifier" required>
                </div>
                <div class="mb-3">
                  <label for="login-password" class="form-label">Password</label>
                  <input type="password" class="form-control" id="login-password" name="password" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe" name="remember_me">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                  </div>
                  <a href="#" class="small text-decoration-none">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-dark w-100">Login</button>
              </form>

              <p class="text-center mt-3 mb-0">
                Don’t have an account? <a href="signup.html" class="text-decoration-none">Sign up here</a>.
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-dark text-white text-center py-4 footer-small">
